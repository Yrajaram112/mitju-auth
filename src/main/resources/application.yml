spring:
  application:
    name: mitju-auth-service

  # ── Datasource (HikariCP) ──────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:mitju}
    username: ${DB_USER:mitju_user}
    password: ${DB_PASS:mitju_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: MitjuAuthPool
      maximum-pool-size: 30          # ~300 concurrent threads / 10ms avg query = 30 needed
      minimum-idle: 5
      idle-timeout: 30000            # 30s
      connection-timeout: 5000       # fail fast — 5s
      max-lifetime: 1800000          # 30 min — rotate before Postgres kills idle
      keepalive-time: 60000
      auto-commit: false
      connection-test-query: SELECT 1
      data-source-properties:
        reWriteBatchedInserts: true
        ApplicationName: mitju-auth-service

  # ── JPA ────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate             # Flyway owns schema — JPA only validates
    show-sql: false
    open-in-view: false              # Never true in microservices
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: auth
        format_sql: false
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
#        connection:
#          provider_disables_autocommit: true

  # ── Flyway ─────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false
    schemas: auth, profile, matching, messaging, subscription

  # ── Redis ──────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:mitju_redis_pass}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 1000ms

# ── Server ─────────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 100
    connection-timeout: 5000

# ── Actuator / Prometheus ──────────────────────────────────────────────────────
management:
  server:
    port: 8081                      # same port for local dev — use 8091 in prod behind firewall
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, loggers
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${APP_ENV:local}

# ── JWT ────────────────────────────────────────────────────────────────────────
jwt:
  # IMPORTANT: in production set this via env var JWT_SECRET — min 64 chars Base64
  # Generate with: openssl rand -base64 64
  secret: ${JWT_SECRET:bWl0anUtc3VwZXItc2VjcmV0LWtleS1mb3ItbG9jYWwtZGV2LW9ubHktY2hhbmdlLWluLXByb2R1Y3Rpb24=}
  access-token-expiry-seconds: ${JWT_ACCESS_EXPIRY:900}        # 15 min
  refresh-token-expiry-seconds: ${JWT_REFRESH_EXPIRY:2592000}  # 30 days
  issuer: mitju.com

# ── Logging (structured JSON in prod, readable in dev) ────────────────────────
logging:
  level:
    root: INFO
    com.mitju: DEBUG
    org.springframework.security: DEBUG   # lower to INFO in prod
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"

# ── Springdoc / Swagger ────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true


