name: Spring Boot CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      
      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Build JAR 
        run: ./mvnw clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 1

      - name: Restart App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Stop the old app
            pkill -f 'java -jar' || true
            
            # 2. Navigate to the app folder
            cd /home/${{ secrets.EC2_USERNAME }}/app
            
            # 3. Clean up old logs (optional but helpful)
            rm -f app.log
            
            # 4. Run the new jar in the background
            # We use 'disown' to make sure the process doesn't die when the SSH session ends
            nohup java -jar *.jar > app.log 2>&1 & 
            sleep 5
            
            # 5. Check if it actually stayed alive
            ps aux | grep java