name: Spring Boot CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      
      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Build JAR 
        run: ./mvnw clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 1

      - name: Restart App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            pgrep -f 'java -jar' | xargs kill -9 || true
            cd /home/${{ secrets.EC2_USERNAME }}/app
            rm -f app.log
            
            # Start with a very small initial heap (Xms) 
            # but allow it to grow to 512MB now that we have Swap
            nohup java -Xms64m -Xmx512m -jar *.jar > app.log 2>&1 &
            
            # Wait 45 seconds (startup is slower when swapping)
            sleep 45
            
            if grep -q "Started" app.log || grep -q "JVM running" app.log; then
              echo "Application started successfully."
            else
              echo "Startup failed. Logs:"
              tail -n 100 app.log
              exit 1
            fi