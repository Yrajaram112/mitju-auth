name: Spring Boot CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      
      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Build JAR 
        run: ./mvnw clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 1

      - name: Restart App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Kill old process
            pgrep -f 'java -jar' | xargs kill -9 || true
            
            # 2. Clear old logs so we don't read old "Started" messages
            cd /home/${{ secrets.EC2_USERNAME }}/app
            rm -f app.log
            
            # 3. Check current memory before starting (for debugging)
            free -m
            
            # 4. Start with lower memory and MetaSpace limits
            nohup java -Xms128m -Xmx384m -XX:MaxMetaspaceSize=128m -jar *.jar > app.log 2>&1 &
            
            # 5. Wait longer (Java 21 on a micro instance is slow)
            sleep 30
            
            if grep -q "Started" app.log || grep -q "JVM running" app.log; then
              echo "Application started successfully."
            else
              echo "Startup failed. Printing system memory and app logs:"
              free -m
              tail -n 50 app.log
              exit 1
            fi