name: Spring Boot CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      
      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Build JAR 
        run: ./mvnw clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 1

      - name: Restart App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Kill the old process, but don't kill the current shell
            pgrep -f 'java -jar' | xargs kill -9 || true
            
            # 2. Navigate and clear logs
            cd /home/${{ secrets.SERVER_USER }}/app
            
            # 3. The "Double Detach" method
            # ( > /dev/null 2>&1 & ) ensures the shell doesn't wait for output
            nohup java -jar *.jar > app.log 2>&1 &
            
            # 4. Give it a moment to initialize
            sleep 10
            
            # 5. Check logs instead of ps aux (more reliable)
            if grep -q "Started" app.log || grep -q "JVM running" app.log; then
              echo "Application started successfully."
            else
              echo "Application might have failed. Checking last 20 lines of log:"
              tail -n 20 app.log
              exit 1
            fi