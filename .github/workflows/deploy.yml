name: Spring Boot CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      
      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Build JAR 
        run: ./mvnw clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 1

      - name: Restart App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Kill old process
            pgrep -f 'java -jar' | xargs kill -9 || true
            cd /home/${{ secrets.EC2_USERNAME }}/app
            rm -f app.log
            
            # 2. Optimized JVM arguments for 1GB RAM + Swap
            # -XX:+UseSerialGC: Minimal memory overhead for GC
            # -Xss256k: Reduce thread stack size (saves a lot of RAM)
            nohup java -Xms64m -Xmx384m -Xss256k -XX:+UseSerialGC -jar *.jar > app.log 2>&1 &
            
            # 3. Use a "Soft" wait
            # Instead of waiting 45s and checking once, we check every 5 seconds
            # This helps us see the log even if it crashes halfway through
            for i in {1..12}; do
              if grep -q "Started" app.log || grep -q "JVM running" app.log; then
                echo "Application started successfully."
                exit 0
              fi
              echo "Waiting for app to start... (Attempt $i/12)"
              sleep 10
            done

            echo "Startup timed out or failed. Final logs:"
            tail -n 100 app.log
            exit 1